<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Karim Haroun</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    (function () {
      emailjs.init("i2q_mlbfVpC7DhLxY");
    })();
  </script>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="cv.html">Resume</a></li>
        <li><a href="teaching.html">Teaching</a></li>
        <li><a href="research.html">Research</a></li>
        <li><a href="publications.html">Publications</a></li>
        <li><a href="talks.html">Talks</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section-card">
      <h1 class="section-title">Contact</h1>
      <div id="mapid"></div>

      <form id="contact-form">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="message" placeholder="Your message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
      <p id="response-message"></p>
    </section>
  </main>

  <script>
    document.getElementById("contact-form").addEventListener("submit", function (event) {
      event.preventDefault();

      var name = document.getElementById("name").value;
      var email = document.getElementById("email").value;
      var message = document.getElementById("message").value;

      var templateParams = {
        from_name: name,
        from_email: email,
        message: message
      };

      emailjs.send("service_nn3n8n2", "template_mv43pa9", templateParams).then(
        function () {
          document.getElementById("response-message").innerHTML = "Your message has been sent.";
          document.getElementById("contact-form").reset();
        },
        function () {
          document.getElementById("response-message").innerHTML = "Failed to send message. Please try again.";
        }
      );
    });

    document.addEventListener("DOMContentLoaded", function () {
      var map = L.map("mapid").setView([48.712814662571404, 2.1934227846549303], 16);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(map);

      L.marker([48.712814662571404, 2.1934227846549303]).addTo(map)
        .bindPopup("<b>CEA-LIST</b><br>2 Boulevard Thomas Gobert<br>91120 Palaiseau")
        .openPopup();
    });
  </script>
</body>
</html>
